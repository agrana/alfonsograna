</g>
<g filter="url(#shadow)">
  <rect x="560" y="908" width="1065" height="205" rx="22" fill="#ffffff"/>
  <rect x="560" y="908" width="1065" height="205" rx="22" fill="#f8fafc" stroke="#cbd5e1" stroke-width="2"/>
  <text x="600" y="958" class="section">How it fits together</text>
  <text x="600" y="998" class="subtitle">WhatsApp hits Gateway first; SSH and RDP talk to Hermes directly. Hermes is chat and agent together.</text>
  <text x="600" y="1030" class="subtitle">Honcho holds agent memory. Obsidian holds your notes. OpenAI and OpenRouter sit in the inference layer.</text>
  <text x="600" y="1062" class="subtitle">Hermes also reaches local IoT through Philips Hue lamp control.</text>
  <text x="600" y="1094" class="subtitle">Coding tools and the shipping stack are grouped separately from inference and IoT.</text>
</g>
