<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="500" viewBox="0 0 1500 500" role="img" aria-labelledby="title desc">
<title id="title">Hermes agent loop</title>
<desc id="desc">A request enters Hermes, which builds context, calls a model, runs tools when needed, feeds results back into the model, and returns a response.</desc>
<defs>
  <marker id="arrow-blue" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto"><path d="M0,0 L12,4.5 L0,9 Z" fill="#2563eb"/></marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto"><path d="M0,0 L12,4.5 L0,9 Z" fill="#16a34a"/></marker>
  <marker id="arrow-purple" markerWidth="12" markerHeight="9" refX="10" refY="4.5" orient="auto"><path d="M0,0 L12,4.5 L0,9 Z" fill="#7c3aed"/></marker>
  <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%"><feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14"/></filter>
  <style>
    .title { font: 800 36px Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
    .subtitle { font: 400 17px Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #4b5563; }
    .step { font: 800 18px Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #111827; }
    .detail { font: 400 14px Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #475569; }
    .label { font: 700 13px Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; fill: #334155; }
  </style>
</defs>
<rect width="1500" height="500" fill="#fbfdff"/>
<text x="70" y="62" class="title">The Hermes Agent Loop</text>
<text x="70" y="94" class="subtitle">Context, model reasoning, and tool results repeat until the request is complete.</text>

<path d="M260,235 H330" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M560,235 H630" fill="none" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow-blue)"/>
<path d="M860,235 H930" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)"/>
<text x="895" y="219" text-anchor="middle" class="label">Tool needed</text>
<path d="M805,175 C900,120 1175,120 1275,175" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrow-green)"/>
<text x="1040" y="128" text-anchor="middle" class="label">Request complete</text>
<path d="M1045,305 V380 H745 V305" fill="none" stroke="#7c3aed" stroke-width="3" marker-end="url(#arrow-purple)"/>
<text x="875" y="402" class="label">Tool result becomes new context</text>

<g filter="url(#shadow)">
  <rect x="70" y="175" width="190" height="120" rx="18" fill="#ffffff" stroke="#60a5fa" stroke-width="2.5"/>
  <text x="165" y="225" text-anchor="middle" class="step">Request</text>
  <text x="165" y="254" text-anchor="middle" class="detail">Message or task</text>
</g>

<g filter="url(#shadow)">
  <rect x="330" y="175" width="230" height="120" rx="18" fill="#eff6ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="445" y="225" text-anchor="middle" class="step">Build context</text>
  <text x="445" y="254" text-anchor="middle" class="detail">Memory, skills, tools</text>
</g>

<g filter="url(#shadow)">
  <rect x="630" y="175" width="230" height="120" rx="18" fill="#faf5ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="745" y="225" text-anchor="middle" class="step">Call model</text>
  <text x="745" y="254" text-anchor="middle" class="detail">Reason about next action</text>
</g>

<g filter="url(#shadow)">
  <rect x="930" y="175" width="230" height="120" rx="18" fill="#fff7ed" stroke="#ea580c" stroke-width="2.5"/>
  <text x="1045" y="225" text-anchor="middle" class="step">Run tool</text>
  <text x="1045" y="254" text-anchor="middle" class="detail">Only when needed</text>
</g>

<g filter="url(#shadow)">
  <rect x="1230" y="175" width="200" height="120" rx="18" fill="#f0fdf4" stroke="#16a34a" stroke-width="2.5"/>
  <text x="1330" y="225" text-anchor="middle" class="step">Respond</text>
  <text x="1330" y="254" text-anchor="middle" class="detail">Return final result</text>
</g>
</svg>
