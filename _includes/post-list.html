<section class="post-list-section" aria-labelledby="recent-posts-heading">
  <h2 id="recent-posts-heading" class="section-heading">Writing</h2>
  <ul class="post-list">
    {% assign post_limit = include.limit | default: 5 %}
    {% for post in site.posts limit:post_limit %}
    <li class="post-card">
      <article>
        <h3 class="post-card-title">
          <a class="post-link" href="{{ post.url | relative_url }}">{{ post.title }}</a>
        </h3>
        <p class="post-meta">
          <time datetime="{{ post.date | date_to_xmlschema }}">{{ post.date | date: "%B %d, %Y" }}</time>
        </p>
      </article>
    </li>
    {% endfor %}
  </ul>
</section>
